name: Scraping TG IDs

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser with input.txt (async mode)
        run: |
          python main.py --input-file input.txt --output output --workers 20 --async

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p output
          # Добавляем все результирующие файлы (включая сжатый JSON, если он есть)
          git add -f output/telegram_ids.txt output/parsed_configs.json.gz output/changes.txt output/metadata.json || \
          git add -f output/telegram_ids.txt output/parsed_configs.json output/changes.txt output/metadata.json || true
          git diff --staged --quiet || git commit -m "Update Telegram IDs (auto)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-ids
          path: output/
