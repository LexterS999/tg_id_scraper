name: Parse Telegram Channels

on:
  schedule:
    # Каждые 3 часа: 0, 3, 6, 9, 12, 15, 18, 21 по UTC
    - cron: '0 */3 * * *'
  workflow_dispatch:  # ручной запуск через интерфейс GitHub

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # разрешаем коммитить изменения

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser with input.txt
        run: |
          python main.py --input-file input.txt --output output

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/telegram_ids.txt output/telegram_ids.json
          git diff --staged --quiet || git commit -m "Update Telegram IDs (auto)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: telegram-ids
          path: output/
